<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Napló — Naptár</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <a class="header-title" href="kezdolap.html">NAPLÓ<span>.</span></a>
      <nav class="page-nav">
        <a href="kezdolap.html">Kezdőlap</a>
        <a href="index.html">Életmód</a>
        <a href="erszint.html">Erőszint</a>
        <a href="tanc.html">Tánc</a>
        <a href="naptar.html" class="active">Naptár</a>
        <a href="trendek.html">Trendek</a>
      </nav>
    </div>
    <div class="dark-toggle">
      <span>Sötét mód</span>
      <label class="switch">
        <input type="checkbox" id="darkToggle">
        <span class="slider"></span>
      </label>
    </div>
  </header>

  <div class="layout-full">
    <div class="content-head">
      <div>
        <h1>Naptár</h1>
        <p class="sub">Edzések, táncórák és a ciklusszakasz egy pillantásra.</p>
      </div>
      <button class="naptar-ma-btn" id="naptarMa">Ma</button>
    </div>

    <div class="data-card">
      <div class="naptar-fejlec">
        <div class="naptar-fejlec-nav">
          <button class="naptar-nav-btn" id="naptarElozo">‹</button>
          <h2 id="naptarCim">—</h2>
          <select id="naptarEvValaszto" class="naptar-ev-valaszto"></select>
          <button class="naptar-nav-btn" id="naptarKovetkezo">›</button>
        </div>
        <div class="naptar-nezet-valto">
          <button class="tab active" id="naptarNezetRacs" type="button">Rács</button>
          <button class="tab" id="naptarNezetLista" type="button">Lista</button>
        </div>
      </div>

      <div class="naptar-osszegzo" id="naptarOsszegzo"></div>

      <div class="naptar-legenda">
        <span><i style="background:var(--menstrual)"></i> Menstruáció</span>
        <span><i style="background:var(--follicular)"></i> Follikuláris</span>
        <span><i style="background:var(--ovulation)"></i> Ovuláció</span>
        <span><i style="background:var(--luteal)"></i> Luteális</span>
        <span class="naptar-legenda-ikon">🏋️ Edzés</span>
        <span class="naptar-legenda-ikon">💃 Tánc</span>
      </div>

      <div class="naptar-hetnapok" id="naptarHetnapokSor">
        <span>H</span><span>K</span><span>SZE</span><span>CS</span><span>P</span><span>SZO</span><span>V</span>
      </div>

      <div class="naptar-racs" id="naptarRacs"></div>
      <div class="naptar-lista" id="naptarLista" style="display:none;"></div>
    </div>

    <div class="data-card" id="napReszletPanel" style="display:none;"></div>
  </div>

  <footer class="foot">Adatforrás: Google Sheets — automatikusan frissül minden betöltéskor.</footer>

<script src="script.js"></script>
</body>
</html>
