<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness & Ciklus Napló</title>
    <!-- Tailwind CSS a szép kinézethez -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js a gyönyörű interaktív grafikonokhoz -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center md:text-left flex flex-col md:flex-row justify-between items-center border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500">Fitness & Ciklus Dashboard</h1>
                <p class="text-gray-400 text-sm mt-1">Automatikus adatszinkronizáció Google Sheets-ből</p>
            </div>
            <div class="mt-4 md:mt-0">
                <label for="gyakorlatValaszto" class="block text-xs font-semibold uppercase text-gray-400 mb-1">Gyakorlat kiválasztása:</label>
                <select id="gyakorlatValaszto" class="bg-gray-800 border border-gray-700 rounded px-4 py-2 text-white focus:outline-none focus:border-pink-500">
                    <option value="">Betöltés...</option>
                </select>
            </div>
        </header>

        <!-- STATISZTIKAI KÁRTYÁK -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-lg">
                <span class="text-xs text-gray-400 block uppercase font-semibold">Utolsó Súly</span>
                <span id="statSuly" class="text-2xl font-bold text-white">-- kg</span>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-lg">
                <span class="text-xs text-gray-400 block uppercase font-semibold">Mai Kalória</span>
                <span id="statKcal" class="text-2xl font-bold text-orange-400">-- kcal</span>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-lg">
                <span class="text-xs text-gray-400 block uppercase font-semibold">Mai Lépés</span>
                <span id="statLepes" class="text-2xl font-bold text-green-400">--</span>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-lg">
                <span class="text-xs text-gray-400 block uppercase font-semibold">Ciklus szakasz</span>
                <span id="statCiklus" class="text-2xl font-bold text-pink-400">--</span>
            </div>
        </div>

        <!-- GRAFIKONOK -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Edzés Grafikon -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl">
                <h3 class="text-lg font-bold mb-4 text-violet-400">Edzés Fejlődés (Súly & Volumen)</h3>
                <div class="relative h-80">
                    <canvas id="edzesChart"></canvas>
                </div>
            </div>
            <!-- Súly és Kalória Grafikon -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl">
                <h3 class="text-lg font-bold mb-4 text-pink-400">Testsúly & Kalória Alakulása</h3>
                <div class="relative h-80">
                    <canvas id="napiChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. CSERÉLD KI EZT A SAJÁT GOOGLE SHEET ID-DRA:
        const SPREADSHEET_ID = '1NxTR3teMZjljuzvJNljJxRs_1U08uHTX1aTcSQlhCkA';
        
        let edzesAdatok = [];
        let napiAdatok = [];
        let edzesChart, napiChart;

        // Adatok lekérése a Google Sheets-ből (CSV formátumban, mert így nem kell API kulcs)
        async function adatBetoltes() {
            try {
                const urlNapi = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=Napi_adatok`;
                const urlEdzes = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=Edzes_Naplo`;

                const [resNapi, resEdzes] = await Promise.all([fetch(urlNapi), fetch(urlEdzes)]);
                const csvNapi = await resNapi.text();
                const csvEdzes = await resEdzes.text();

                napiAdatok = csvToObjects(csvNapi);
                edzesAdatok = csvToObjects(csvEdzes);

                uiFrissites();
                gyakorlatListaFeltoltes();
                grafikonokInicializalasa();
            } catch (error) {
                console.error("Hiba az adatok betöltésekor:", error);
            }
        }

        // CSV szöveg átalakítása könnyen kezelhető JavaScript objektumokká
        function csvToObjects(csvText) {
            const sorok = csvText.split('\n').map(sor => 
                sor.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cella => cella.replace(/^"|"$/g, '').trim())
            );
            const fejlecek = sorok[0];
            return sorok.slice(1).filter(s => s.length >= fejlecek.length && s[0] !== "").map(sor => {
                let obj = {};
                fejlecek.forEach((fejlec, i) => { obj[fejlec] = sor[i]; });
                return obj;
            });
        }

        function uiFrissites() {
            if (napiAdatok.length === 0) return;
            const utolsoNapi = napiAdatok[napiAdatok.length - 1];
            
            document.getElementById('statSuly').innerText = (utolsoNapi['Testsúly'] || utolsoNapi['Testsúly (kg)'] || '--') + ' kg';
            document.getElementById('statKcal').innerText = (utolsoNapi['Kalória'] || utolsoNapi['Bevitt kalória (kcal)'] || '--') + ' kcal';
            document.getElementById('statLepes').innerText = Number(utolsoNapi['Lépések'] || utolsoNapi['Napi lépésszám'] || 0).toLocaleString('hu-HU');
            document.getElementById('statCiklus').innerText = utolsoNapi['Ciklus szakasz'] || '--';
        }

        function gyakorlatListaFeltoltes() {
            const valaszto = document.getElementById('gyakorlatValaszto');
            const egyediGyakorlatok = [...new Set(edzesAdatok.map(e => e['Gyakorlat'] || e['Gyakorlat neve']))].filter(Boolean);
            
            valaszto.innerHTML = '';
            egyediGyakorlatok.forEach(gy => {
                const opt = document.createElement('option');
                opt.value = gy;
                opt.innerText = gy;
                valaszto.appendChild(opt);
            });

            valaszto.addEventListener('change', (e) => edzesGrafikonFrissites(e.target.value));
            if (egyediGyakorlatok.length > 0) edzesGrafikonFrissites(egyediGyakorlatok[0]);
        }

        function grafikonokInicializalasa() {
            // Napi adatok (Súly és Kalória) grafikon
            const ctxNapi = document.getElementById('napiChart').getContext('2d');
            const datumok = napiAdatok.map(n => n['Dátum']);
            const sulyok = napiAdatok.map(n => parseFloat(n['Testsúly'] || n['Testsúly (kg)']));
            const kcalok = napiAdatok.map(n => parseInt(n['Kalória'] || n['Bevitt kalória (kcal)']));

            napiChart = new Chart(ctxNapi, {
                type: 'line',
                data: {
                    labels: datumok,
                    datasets: [
                        { label: 'Súly (kg)', data: sulyok, borderColor: '#ec4899', yAxisID: 'ySuly', tension: 0.1 },
                        { label: 'Kalória (kcal)', data: kcalok, borderColor: '#f97316', backgroundColor: 'rgba(249, 115, 22, 0.1)', fill: true, yAxisID: 'yKcal', tension: 0.1 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        ySuly: { type: 'linear', position: 'left', grid: { color: '#374151' } },
                        yKcal: { type: 'linear', position: 'right', grid: { drawOnChartArea: false } }
                    }
                }
            });
        }

        function edzesGrafikonFrissites(gyakorlatNev) {
            const szurtEdzesek = edzesAdatok.filter(e => (e['Gyakorlat'] || e['Gyakorlat neve']) === gyakorlatNev);
            const datumok = szurtEdzesek.map(e => e['Dátum']);
            const sulyok = szurtEdzesek.map(e => parseFloat(e['Súly'] || e['Súly (kg)']));
            const volumenek = szurtEdzesek.map(e => {
                const sz = parseInt(e['Széria'] || 0);
                const i = parseInt(e['Ismétlés'] || 0);
                const s = parseFloat(e['Súly'] || e['Súly (kg)'] || 0);
                return sz * i * s;
            });

            const ctxEdzes = document.getElementById('edzesChart').getContext('2d');

            if (edzesChart) edzesChart.destroy();

            edzesChart = new Chart(ctxEdzes, {
                type: 'line',
                data: {
                    labels: datumok,
                    datasets: [
                        { label: 'Max Súly (kg)', data: sulyok, borderColor: '#a78bfa', tension: 0.1 },
                        { label: 'Össz. Volumen (kg)', data: volumenek, borderColor: '#eab308', yAxisID: 'yVolumen', tension: 0.1 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { title: { display: true, text: 'Súly (kg)' }, grid: { color: '#374151' } },
                        yVolumen: { type: 'linear', position: 'right', title: { display: true, text: 'Volumen (kg)' }, grid: { drawOnChartArea: false } }
                    }
                }
            });
        }

        // Indítás
        adatBetoltes();
    </script>
</body>
</html>
